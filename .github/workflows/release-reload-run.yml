name: Release reload-run

on:
  push:
    tags:
      - 'reload-run/v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          MOD_VERSION=$(python3 -c "import json; print(json.load(open('mods/reload-run/reload-run.json'))['version'])")
          echo "MOD_VERSION=$MOD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "reload-run ${{ steps.version.outputs.MOD_VERSION }}" \
            --generate-notes \
            --prerelease
